<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#01696f" />
  <title>PD Supplies</title>
  <style>
    :root,[data-theme="light"]{--bg:#f7f6f2;--surface:#f9f8f5;--surface2:#fbfbf9;--border:#d4d1ca;--text:#28251d;--muted:#5f5d58;--faint:#8c8a84;--inverse:#f9f8f4;--primary:#01696f;--primary2:#cedcd8;--warning:#964219;--error:#a12c7b;--success:#437a22;--blue:#006494;--rsm:.5rem;--rmd:.75rem;--rlg:1rem;--rxl:1.25rem;--rfull:9999px;--shadow:0 1px 2px rgba(0,0,0,.06);--shadow2:0 8px 22px rgba(0,0,0,.08);--text-xs:.8rem;--text-sm:.92rem;--text-base:1rem;--text-lg:1.125rem;--text-xl:1.65rem}
    [data-theme="dark"]{--bg:#171614;--surface:#1c1b19;--surface2:#201f1d;--border:#393836;--text:#e4e1da;--muted:#b5b1aa;--faint:#87837d;--inverse:#111;--primary:#4f98a3;--primary2:#313b3b;--warning:#d38d67;--error:#d163a7;--success:#82ba5e;--blue:#70addb;--shadow:0 1px 2px rgba(0,0,0,.25);--shadow2:0 8px 22px rgba(0,0,0,.35)}
    *{box-sizing:border-box} html{-webkit-text-size-adjust:none;text-size-adjust:none} body{margin:0;min-height:100dvh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:var(--text-base);line-height:1.5;background:var(--bg);color:var(--text)} button,input,select,textarea{font:inherit;color:inherit} button{cursor:pointer;border:none;background:none} .app{max-width:720px;margin:0 auto;padding:env(safe-area-inset-top) 12px 0} .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0;background:linear-gradient(180deg,var(--bg) 80%,transparent)} .brand h1{margin:0;font-size:1.45rem} .brand p{margin:.15rem 0 0;color:var(--muted);font-size:var(--text-xs)} .icon-btn{width:40px;height:40px;border-radius:9999px;background:var(--surface);border:1px solid rgba(0,0,0,.08);box-shadow:var(--shadow)} .hero,.panel,.sheet{background:var(--surface);border:1px solid var(--border);border-radius:var(--rxl);box-shadow:var(--shadow)} .hero{padding:16px;display:grid;gap:12px} .hero h2{margin:0;font-size:var(--text-lg)} .hero p{margin:0;color:var(--muted);font-size:var(--text-xs)} .hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px} .stat{padding:12px;border-radius:var(--rlg);background:var(--surface2);text-align:center} .stat strong{display:block;font-size:1.35rem} .stat span{font-size:var(--text-xs);color:var(--muted)} .controls{display:grid;gap:12px;margin:14px 0} .search{display:flex;gap:8px;align-items:center;min-height:44px;padding:0 12px;background:var(--surface);border:1px solid var(--border);border-radius:9999px} .search input{width:100%;border:none;outline:none;background:transparent} .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px} .btn{min-height:44px;border-radius:9999px;padding:0 16px;font-weight:700} .btn-primary{background:var(--primary);color:var(--inverse)} .btn-secondary{background:var(--surface);border:1px solid var(--border)} .stack{display:grid;gap:12px} .list{display:grid;gap:10px} .card{padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);display:grid;gap:10px} .row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start} .name{margin:0;font-size:var(--text-base);font-weight:700} .meta,.tiny{font-size:var(--text-xs);color:var(--muted)} .chips{display:flex;flex-wrap:wrap;gap:8px} .chip{padding:5px 10px;border-radius:9999px;font-size:var(--text-xs);font-weight:700;background:var(--surface2)} .chip.ok{color:var(--success)} .chip.low{color:var(--warning)} .chip.out{color:var(--error)} .chip.home{color:var(--primary)} .chip.clinic{color:var(--blue)} .hidden{display:none!important} .empty{padding:20px 14px;text-align:center;color:var(--muted);background:var(--surface);border:1px dashed var(--border);border-radius:var(--rxl)} .sheet-wrap{position:fixed;inset:0;background:rgba(0,0,0,.34);display:none;align-items:end;justify-content:center;padding:12px;z-index:20} .sheet-wrap.open{display:flex} .sheet{width:min(720px,100%);max-height:90dvh;overflow:auto;padding:18px;border-bottom-left-radius:0;border-bottom-right-radius:0} form{display:grid;gap:12px} .field{display:grid;gap:6px} .field label{font-size:var(--text-sm);font-weight:700} .field input,.field select,.field textarea{min-height:44px;padding:0 12px;border-radius:var(--rmd);border:1px solid var(--border);background:var(--surface2)} .field textarea{min-height:92px;padding:12px;resize:vertical} .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px} .footer-note{margin:16px 0 76px;font-size:var(--text-xs);color:var(--muted);text-align:center} .bottom-tabbar{position:fixed;left:0;right:0;bottom:0;height:64px;padding:0 10px calc(env(safe-area-inset-bottom,0px) + 6px);display:grid;grid-template-columns:repeat(4,1fr);gap:8px;border-top:1px solid rgba(0,0,0,.1);background:linear-gradient(180deg,var(--surface) 0%,color-mix(in srgb,var(--surface2),white 10%) 100%);backdrop-filter:blur(10px);box-shadow:0 -1px 8px rgba(0,0,0,.08);z-index:50} .bottom-tabbar .tab{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 0;border-radius:10px;font-size:var(--text-xs);color:var(--faint)} .bottom-tabbar .tab.active{color:var(--primary);background:color-mix(in srgb,var(--primary2),transparent 80%)} .bottom-tabbar .icon{font-size:1.1rem;line-height:1} @media (max-width:560px){.app{padding-inline:8px}.hero-grid,.grid-2,.actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><div><h1>PD Supplies</h1><p>Mobile tracker for home dialysis inventory</p></div></div>
      <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme">🌙</button>
    </header>

    <main id="main" style="padding-bottom:84px">
      <section class="hero">
        <div>
          <h2>Track what you have before reorder day.</h2>
          <p>PD supplies, support items, clinic pickups, and ordering planning.</p>
        </div>
        <div class="hero-grid">
          <div class="stat"><strong id="statTotal">0</strong><span>Total items</span></div>
          <div class="stat"><strong id="statLow">0</strong><span>Need attention</span></div>
        </div>
      </section>

      <section class="controls">
        <div class="search"><span aria-hidden="true">🔍</span><input id="searchInput" type="search" placeholder="Search supply name" /></div>
        <div class="actions">
          <button class="btn btn-primary" id="newBtn" type="button">+ Add supply</button>
          <button class="btn btn-secondary" id="exportBtn" type="button">Export JSON</button>
        </div>
      </section>

      <section id="inventoryView" class="view"><div id="inventoryList" class="list"></div></section>
      <section id="reorderView" class="view hidden"><div id="reorderList" class="list"></div></section>
      <section id="clinicView" class="view hidden"><div id="clinicList" class="list"></div></section>
      <section id="historyView" class="view hidden"><div id="historyList" class="list"></div></section>
      <p class="footer-note">Data saves only in this browser on this device.</p>
    </main>
  </div>

  <nav class="bottom-tabbar" role="navigation" aria-label="App sections">
    <button class="tab active" data-tab="inventory" type="button"><span class="icon">📦</span><span>Inventory</span></button>
    <button class="tab" data-tab="reorder" type="button"><span class="icon">🔄</span><span>Reorder</span></button>
    <button class="tab" data-tab="clinic" type="button"><span class="icon">🏥</span><span>Clinic</span></button>
    <button class="tab" data-tab="history" type="button"><span class="icon">📊</span><span>History</span></button>
  </nav>

  <div class="sheet-wrap" id="sheetWrap" aria-hidden="true">
    <section class="sheet">
      <div class="row" style="margin-bottom:12px"><h3 id="sheetTitle">New supply</h3><button id="closeSheet" type="button" aria-label="Close">×</button></div>
      <form id="itemForm">
        <input type="hidden" id="itemId" />
        <div class="field"><label for="name">Item name</label><input id="name" required placeholder="Dialysate, masks, etc." /></div>
        <div class="grid-2">
          <div class="field"><label for="category">Category</label><select id="category"><option>PD supply</option><option>Support supply</option><option>Medication</option><option>Other</option></select></div>
          <div class="field"><label for="unit">Unit</label><input id="unit" placeholder="bags, boxes, etc." /></div>
        </div>
        <div class="grid-2">
          <div class="field"><label for="onHand">On hand</label><input id="onHand" type="number" min="0" step="1" /></div>
          <div class="field"><label for="biweeklyNeed">Bi-weekly need</label><input id="biweeklyNeed" type="number" min="0" step="1" /></div>
        </div>
        <div class="grid-2">
          <div class="field"><label for="reorderPoint">Reorder point</label><input id="reorderPoint" type="number" min="0" step="1" /></div>
          <div class="field"><label for="reserve">Emergency reserve</label><input id="reserve" type="number" min="0" step="1" /></div>
        </div>
        <div class="grid-2">
          <div class="field"><label for="homeQty">Plan home delivery</label><input id="homeQty" type="number" min="0" step="1" /></div>
          <div class="field"><label for="clinicQty">Plan clinic pickup</label><input id="clinicQty" type="number" min="0" step="1" /></div>
        </div>
        <div class="grid-2">
          <div class="field"><label for="status">Status</label><select id="status"><option value="draft">Draft</option><option value="planned">Planned</option><option value="submitted">Submitted in MyBaxter</option><option value="received">Received</option></select></div>
          <div class="field"><label for="expires">Expiration</label><input id="expires" type="date" /></div>
        </div>
        <div class="field"><label for="notes">Notes</label><textarea id="notes" placeholder="Storage, clinic details..."></textarea></div>
        <div class="grid-2"><button type="submit" class="btn btn-primary">Save</button><button id="deleteBtn" class="btn btn-secondary" type="button">Delete</button></div>
      </form>
    </section>
  </div>

  <script>
    const STORAGE_KEY='pd-supplies-v1-safe';
    const seed={activeTab:'inventory',search:'',items:[],history:[]};
    const $=id=>document.getElementById(id);
    const state=loadState();
    const views={inventory:$('inventoryView'),reorder:$('reorderView'),clinic:$('clinicView'),history:$('historyView')};

    function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);return raw?{...seed,...JSON.parse(raw)}:seed}catch{return seed}}
    function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
    const num=v=>Number(v)||0;
    function meta(item){const low=num(item.onHand)<=Math.max(num(item.reorderPoint),num(item.reserve));const out=num(item.onHand)===0;const needsOrder=num(item.biweeklyNeed)>num(item.onHand)||low;return{low,out,needsOrder}}
    function badge(item){const m=meta(item);return m.out?['Out','out']:m.low?['Low','low']:['OK','ok']}
    function matches(item){const q=state.search.trim().toLowerCase();return !q||[item.name,item.category,item.notes].join(' ').toLowerCase().includes(q)}

    function renderStats(){$('statTotal').textContent=state.items.length;$('statLow').textContent=state.items.filter(i=>meta(i).low||meta(i).out).length}
    function card(item){const [label,cls]=badge(item);return `<article class="card"><div class="row"><div><h3 class="name">${esc(item.name||'Untitled supply')}</h3><p class="meta">${esc(item.category)} · On hand ${num(item.onHand)} ${esc(item.unit||'units')}</p></div><span class="chip ${cls}">${label}</span></div><div class="chips"><span class="chip">Need ${num(item.biweeklyNeed)}</span><span class="chip">Reorder at ${num(item.reorderPoint)}</span>${num(item.homeQty)?`<span class="chip home">Home ${num(item.homeQty)}</span>`:''}${num(item.clinicQty)?`<span class="chip clinic">Clinic ${num(item.clinicQty)}</span>`:''}</div><div class="row"><p class="tiny">${esc(item.notes||'No notes')}</p><button class="btn btn-secondary" type="button" data-edit="${item.id}" style="min-height:40px">Edit</button></div></article>`}
    function renderInventory(){const items=state.items.filter(matches);$('inventoryList').innerHTML=items.length?items.map(card).join(''):`<div class="empty"><p>No supplies yet</p><p>Tap Add supply to enter your first PD or support item.</p></div>`}
    function renderReorder(){const items=state.items.filter(i=>matches(i)&&meta(i).needsOrder);$('reorderList').innerHTML=items.length?items.map(i=>{const suggested=Math.max(0,num(i.biweeklyNeed)+num(i.reserve)-num(i.onHand));return `<article class="card"><div class="row"><div><h3 class="name">${esc(i.name)}</h3><p class="meta">Suggested order ${suggested} ${esc(i.unit||'units')}</p></div><span class="chip low">${esc(i.status||'draft')}</span></div><p class="tiny">On hand ${num(i.onHand)} · Reserve ${num(i.reserve)} · Home ${num(i.homeQty)} · Clinic ${num(i.clinicQty)}</p></article>`}).join(''):`<div class="empty"><p>No reorder items</p><p>Your inventory is above reorder targets.</p></div>`}
    function renderClinic(){const items=state.items.filter(i=>matches(i)&&num(i.clinicQty)>0);$('clinicList').innerHTML=items.length?items.map(i=>`<article class="card"><div class="row"><div><h3 class="name">${esc(i.name)}</h3><p class="meta">Clinic pickup planned: ${num(i.clinicQty)} ${esc(i.unit||'units')}</p></div><span class="chip clinic">Clinic</span></div><p class="tiny">${esc(i.notes||'No clinic notes')}</p></article>`).join(''):`<div class="empty"><p>No clinic pickups planned</p><p>Use clinic quantity when an item will come from your clinic instead of home delivery.</p></div>`}
    function renderHistory(){$('historyList').innerHTML=state.history.length?state.history.slice().reverse().map(h=>`<article class="card"><h3 class="name">${esc(h.title)}</h3><p class="tiny">${esc(h.time)}</p></article>`).join(''):`<div class="empty"><p>No history yet</p><p>Saved edits and exports will appear here.</p></div>`}
    function setTab(tab){state.activeTab=tab;Object.entries(views).forEach(([k,el])=>el.classList.toggle('hidden',k!==tab));document.querySelectorAll('.bottom-tabbar .tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));saveState()}
    function renderAll(){renderStats();renderInventory();renderReorder();renderClinic();renderHistory();setTab(state.activeTab)}
    function openSheet(item){$('sheetWrap').classList.add('open');$('sheetWrap').setAttribute('aria-hidden','false');$('sheetTitle').textContent=item?.name||'New supply';$('itemId').value=item?.id||'';['name','category','unit','onHand','biweeklyNeed','reorderPoint','reserve','homeQty','clinicQty','expires','status','notes'].forEach(key=>$(key).value=item?.[key]??'');$('deleteBtn').style.display=item?'inline-flex':'none';$('name').focus()}
    function closeSheet(){ $('sheetWrap').classList.remove('open'); $('sheetWrap').setAttribute('aria-hidden','true'); $('itemForm').reset(); $('itemId').value=''; }
    function upsertItem(e){e.preventDefault();const item={id:$('itemId').value||crypto.randomUUID(),name:$('name').value.trim(),category:$('category').value,unit:$('unit').value.trim(),onHand:num($('onHand').value),biweeklyNeed:num($('biweeklyNeed').value),reorderPoint:num($('reorderPoint').value),reserve:num($('reserve').value),homeQty:num($('homeQty').value),clinicQty:num($('clinicQty').value),expires:$('expires').value,status:$('status').value,notes:$('notes').value.trim()};const idx=state.items.findIndex(i=>i.id===item.id);if(idx>=0)state.items[idx]=item;else state.items.unshift(item);state.history.push({title:`Saved ${item.name||'supply item'}`,time:new Date().toLocaleString()});saveState();renderAll();closeSheet()}
    function deleteCurrent(){const id=$('itemId').value;if(!id)return;const item=state.items.find(i=>i.id===id);state.items=state.items.filter(i=>i.id!==id);state.history.push({title:`Deleted ${item?.name||'supply item'}`,time:new Date().toLocaleString()});saveState();renderAll();closeSheet()}
    function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pd-supplies-export.json';a.click();URL.revokeObjectURL(a.href);state.history.push({title:'Exported JSON backup',time:new Date().toLocaleString()});saveState();renderHistory()}
    function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

    document.addEventListener('click',e=>{const t=e.target.closest('.bottom-tabbar .tab');if(t){e.preventDefault();setTab(t.dataset.tab);return}const edit=e.target.closest('[data-edit]');if(edit){openSheet(state.items.find(i=>i.id===edit.dataset.edit));return}if(e.target.id==='closeSheet'||e.target===$('sheetWrap')) closeSheet();if(e.target.id==='deleteBtn') deleteCurrent()});
    $('newBtn').addEventListener('click',()=>openSheet());
    $('itemForm').addEventListener('submit',upsertItem);
    $('exportBtn').addEventListener('click',exportData);
    $('searchInput').addEventListener('input',e=>{state.search=e.target.value;renderInventory();renderReorder();renderClinic();saveState()});
    $('themeToggle').addEventListener('click',()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'});
    renderAll();
  </script>
</body>
</html>
