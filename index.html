<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#01696f" />
  <title>PD Supplies</title>
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-surface-offset: #f3f0ec; --color-border: #d4d1ca; --color-divider: #dcd9d5;
      --color-text: #28251d; --color-text-muted: #5f5d58; --color-text-faint: #8c8a84; --color-text-inverse: #f9f8f4;
      --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-highlight: #cedcd8;
      --color-warning: #964219; --color-error: #a12c7b; --color-success: #437a22; --color-blue: #006494;
      --radius-sm: 0.5rem; --radius-md: 0.75rem; --radius-lg: 1rem; --radius-xl: 1.25rem; --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.06); --shadow-md: 0 8px 22px rgba(0,0,0,.08);
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d; --color-surface-offset: #22211f; --color-border: #393836; --color-divider: #262523;
      --color-text: #e4e1da; --color-text-muted: #b5b1aa; --color-text-faint: #87837d; --color-text-inverse: #111;
      --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #313b3b;
      --color-warning: #d38d67; --color-error: #d163a7; --color-success: #82ba5e; --color-blue: #70addb;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.25); --shadow-md: 0 8px 22px rgba(0,0,0,.35);
    }
    *,*::before,*::after{box-sizing:border-box;}
    html{-webkit-text-size-adjust:none;text-size-adjust:none;scroll-behavior:smooth;}
    body{margin:0;min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);line-height:1.5;background:var(--color-bg);color:var(--color-text);}
    button,input,select,textarea{font:inherit;color:inherit;}
    button{cursor:pointer;border:none;background:none;}
    .app{
      max-width:720px;
      margin:0 auto;
      padding:env(safe-area-inset-top) var(--space-4) 0;
    }
    .skip-link{position:absolute;left:-9999px;}
    .skip-link:focus{
      left:var(--space-4);
      top:var(--space-4);
      background:var(--color-primary);
      color:var(--color-text-inverse);
      padding:var(--space-2) var(--space-3);
      border-radius:var(--radius-sm);
      z-index:10;
    }

    header.topbar{
      position:sticky;top:0;z-index:5;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:var(--space-4) 0;
      background:linear-gradient(180deg,var(--color-bg) 82%,transparent);
      backdrop-filter:blur(8px);
    }
    .brand{
      display:flex;
      gap:var(--space-3);
      align-items:center;
    }
    .logo{
      width:42px;
      height:42px;
      border-radius:14px;
      background:linear-gradient(160deg,var(--color-primary),var(--color-blue));
      display:grid;
      place-items:center;
      color:white;
      box-shadow:var(--shadow-md);
    }
    .brand h1{
      font-size:var(--text-lg);
      line-height:1.1;
      margin:0;
    }
    .brand p{
      margin:0;
      color:var(--color-text-muted);
      font-size:var(--text-xs);
    }
    .icon-btn{
      min-width:44px;
      min-height:44px;
      border-radius:var(--radius-full);
      background:var(--color-surface);
      border:1px solid rgba(0,0,0,.08);
      display:grid;
      place-items:center;
      box-shadow:var(--shadow-sm);
    }

    .hero,.panel,.sheet{
      background:var(--color-surface);
      border:1px solid var(--color-border);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow-sm);
    }
    .hero{
      padding:var(--space-5);
      display:grid;
      gap:var(--space-4);
    }
    .hero-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:var(--space-3);
    }
    .stat{
      padding:var(--space-4);
      border-radius:var(--radius-lg);
      background:var(--color-surface-offset);
    }
    .stat strong{
      display:block;
      font-size:var(--text-lg);
    }
    .stat span{
      font-size:var(--text-xs);
      color:var(--color-text-muted);
    }

    .controls{
      display:grid;
      gap:var(--space-3);
      margin-bottom:var(--space-4);
      padding:0 var(--space-3);
    }
    .search{
      display:flex;
      gap:var(--space-2);
      align-items:center;
      padding:0 var(--space-3);
      background:var(--color-surface);
      border:1px solid var(--color-border);
      border-radius:var(--radius-full);
      min-height:48px;
    }
    .search input{
      border:none;
      outline:none;
      background:transparent;
      width:100%;
    }
    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:var(--space-3);
    }
    .btn{
      min-height:48px;
      border-radius:var(--radius-full);
      padding:0 var(--space-4);
      font-weight:700;
    }
    .btn-primary{
      background:var(--color-primary);
      color:var(--color-text-inverse);
      border:none;
    }
    .btn-secondary{
      background:var(--color-surface);
      border:1px solid var(--color-border);
    }

    .stack{
      display:grid;
      gap:var(--space-4);
    }
    .list{
      display:grid;
      gap:var(--space-3);
    }
    .card{
      padding:var(--space-4);
      background:var(--color-surface);
      border:1px solid var(--color-border);
      border-radius:var(--radius-lg);
      display:grid;
      gap:var(--space-3);
    }
    .row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:var(--space-3);
    }
    .name{
      font-size:var(--text-base);
      font-weight:700;
      margin:0;
    }
    .meta,.tiny{
      font-size:var(--text-xs);
      color:var(--color-text-muted);
    }
