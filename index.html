<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PD Companion</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      background: Canvas;
      color: CanvasText;
    }
    header, nav, main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }
    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tab, .btn, .linkbtn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: inherit;
    }
    .tab.active { background: #2563eb; color: white; }
    .btn { background: ButtonFace; color: ButtonText; }
    .btn-secondary { background: ButtonFace; }
    .btn-danger { background: #fee2e2; color: #991b1b; }
    .view { display: none; }
    .view.active { display: block; }
    .grid { display: grid; gap: 12px; }
    .item, .history-entry, .panel {
      background: Canvas;
      border: 1px solid color-mix(in srgb, CanvasText 10%, transparent);
      border-radius: 14px;
      padding: 14px;
    }
    .between { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .row { display: flex; gap: 8px; align-items: center; }
    .wrap { flex-wrap: wrap; }
    .item-title { font-weight: 700; }
    .meta { opacity: .72; font-size: 14px; white-space: pre-wrap; }
    .tag, .status {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: color-mix(in srgb, CanvasText 10%, transparent);
    }
    .status.good { background: #dcfce7; color: #166534; }
    .status.bad { background: #fee2e2; color: #991b1b; }
    .status.warn { background: #fef3c7; color: #92400e; }
    .qty { font-size: 28px; font-weight: 700; }
    .adjust-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
    .empty { opacity: .7; padding: 14px; text-align: center; }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
      background: Canvas;
      color: CanvasText;
    }
    @media (max-width: 700px) {
      .adjust-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <h1>PD Companion</h1>
  </header>

  <nav id="tabbar">
    <button class="tab" data-tab="home">Home</button>
    <button class="tab" data-tab="treatments">Treatments</button>
    <button class="tab" data-tab="inventory">Inventory</button>
    <button class="tab" data-tab="notes">Notes</button>
    <button class="tab" data-tab="history">History</button>
    <a class="linkbtn" href="https://account.vantive.com" target="_blank" rel="noopener">Vantive</a>
    <a class="linkbtn" href="https://davita.welldyne.com" target="_blank" rel="noopener">WellDyne</a>
    <button class="tab" id="dataActionBtn">Import / Export</button>
  </nav>

  <main>
    <section id="homeView" class="view">
      <div class="panel">
        <h2>Quick actions</h2>
        <div class="row wrap">
          <button class="btn" id="addTreatmentBtn">Add Treatment</button>
          <button class="btn" id="addItemBtn">Add Inventory</button>
          <button class="btn" id="addNoteBtn">Add Note</button>
        </div>
      </div>
    </section>

    <section id="treatmentsView" class="view">
      <div class="panel">
        <div class="between">
          <h2>Treatments</h2>
          <button class="btn btn-secondary" data-show-all-treatments>Show All Treatments</button>
        </div>
        <div id="treatmentsList" class="grid"></div>
      </div>
    </section>

    <section id="inventoryView" class="view">
      <div class="panel">
        <div class="between">
          <h2>Inventory</h2>
          <button class="btn btn-secondary" data-clear-inventory-search>Clear Search</button>
        </div>
        <input type="text" data-inventory-search placeholder="Search inventory">
        <div id="inventoryList" class="grid" style="margin-top:12px;"></div>
      </div>
    </section>

    <section id="notesView" class="view">
      <div class="panel">
        <h2>Notes</h2>
        <div id="notesList" class="grid"></div>
      </div>
    </section>

    <section id="historyView" class="view">
      <div class="panel">
        <h2>History</h2>
        <div id="historyList" class="grid"></div>
      </div>
    </section>

    <div style="display:none;">
      <span id="countTreatments"></span>
      <span id="countItems"></span>
      <span id="countNotes"></span>
    </div>
  </main>

  <script>
    const KEY = 'dialysis-agent-companion-v2';
    const $ = id => document.getElementById(id);

    const state = load() || {
      tab: 'home',
      treatments: [],
      inventory: [],
      notes: [],
      history: [],
      inventorySearch: '',
      showAllTreatments: false
    };

    function load(){ try { return JSON.parse(localStorage.getItem(KEY)); } catch { return null; } }
    function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
    function log(text){
      state.history.unshift({ at:new Date().toISOString(), text });
      state.history = state.history.filter(h => h && h.at && h.text).slice(0,50);
      save();
    }

    function setTab(tab){
      state.tab = tab;
      save();
      render();
    }

    function fmt(iso){ return new Date(iso).toLocaleString(); }
    function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
    function n(v){ return Number(v) || 0; }
    function escapeHtml(s){ return String(s ?? '').replace(/[&<>\"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m])); }

    function cutoffDate(days){
      return new Date(Date.now() - days * 24 * 60 * 60 * 1000);
    }

    function itemsInLastDays(list, days){
      const cutoff = cutoffDate(days);
      return list.filter(item => {
        const d = new Date(item.at || 0);
        return !isNaN(d) && d >= cutoff;
      });
    }

    function recentTreatments(){
      return state.showAllTreatments ? itemsInLastDays(state.treatments, 10) : itemsInLastDays(state.treatments, 5);
    }

    function visibleInventory(){
      const q = String(state.inventorySearch || '').trim().toLowerCase();
      if (!q) return state.inventory;
      return state.inventory.filter(item =>
        String(item.title || '').toLowerCase().includes(q) ||
        String(item.detail || '').toLowerCase().includes(q)
      );
    }

    function renderCounts(){
      $('countTreatments').textContent = recentTreatments().length;
      $('countItems').textContent = state.inventory.length;
      $('countNotes').textContent = state.notes.length;
    }

    function renderViews(){
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const map = {
        home: $('homeView'),
        treatments: $('treatmentsView'),
        inventory: $('inventoryView'),
        notes: $('notesView'),
        history: $('historyView')
      };
      (map[state.tab] || map.home).classList.add('active');
      document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === state.tab));
    }

    function treatmentEntry(item){
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `<div class="between"><div><div class="item-title">${escapeHtml(item.title || 'Treatment')}</div><div class="meta">${escapeHtml(item.detail || '')}</div></div><span class="tag">${fmt(item.at)}</span></div><div class="row wrap" style="margin-top:10px;"><button class="btn small btn-secondary" data-edit="treatment" data-id="${item.id}">Edit</button><button class="btn small btn-danger" data-del="treatment" data-id="${item.id}">Delete</button></div>`;
      return div;
    }

    function inventoryEntry(item){
      const low = n(item.qty) <= n(item.reorderPoint || 0);
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `<div class="between"><div><div class="item-title">${escapeHtml(item.title || 'Item')}</div><div class="meta">${escapeHtml(item.detail || '')}</div></div><span class="status ${item.ordered ? 'warn' : (low ? 'bad' : 'good')}">${item.ordered ? 'Ordered' : (low ? 'Low' : 'OK')}</span></div><div class="between" style="margin-top:10px;"><div class="qty">${n(item.qty)}</div><div class="meta">Reorder at ${n(item.reorderPoint || 0)}</div></div><div class="adjust-grid"><button class="btn small btn-secondary" data-adjust="-5" data-id="${item.id}">-5</button><button class="btn small btn-secondary" data-adjust="-1" data-id="${item.id}">-1</button><button class="btn small btn-secondary" data-adjust="1" data-id="${item.id}">+1</button><button class="btn small btn-secondary" data-adjust="5" data-id="${item.id}">+5</button></div><div class="row wrap" style="margin-top:10px;"><button class="btn small btn-secondary" data-order="${item.id}">${item.ordered ? 'Unmark ordered' : 'Mark ordered'}</button><button class="btn small btn-secondary" data-edit="inventory" data-id="${item.id}">Edit</button><button class="btn small btn-danger" data-del="inventory" data-id="${item.id}">Delete</button></div>`;
      return div;
    }

    function noteEntry(item){
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `<div class="between"><div><div class="item-title">${escapeHtml(item.title || 'Note')}</div><div class="meta">${escapeHtml(item.detail || '')}</div></div><span class="tag">${fmt(item.at)}</span></div><div class="row wrap" style="margin-top:10px;"><button class="btn small btn-secondary" data-edit="note" data-id="${item.id}">Edit</button><button class="btn small btn-danger" data-del="note" data-id="${item.id}">Delete</button></div>`;
      return div;
    }

    function historyEntry(item){
      const div = document.createElement('div');
      div.className = 'history-entry';
      div.innerHTML = `<div class="meta">${fmt(item.at)}</div><div>${escapeHtml(item.text)}</div>`;
      return div;
    }

    function addTreatment(){
      const pasted = prompt('Paste the Shortcut results here.');
      if (!pasted) return;
      const lines = String(pasted).split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      if (!lines.length) return;
      const header = lines[0];
      const phase = /post/i.test(header) ? 'post' : 'pre';
      const title = `${phase.toUpperCase()} TREATMENT`;
      state.treatments.unshift({ id: uid(), title, phase, detail: lines.join('\n'), at: new Date().toISOString() });
      log(`Added treatment: ${title}`);
      render();
    }

    function findInventoryItemByName(name) {
      const q = String(name || '').trim().toLowerCase();
      return state.inventory.find(item => String(item.title || '').trim().toLowerCase() === q);
    }

    function applyInventoryCommand(text) {
      const input = String(text || '').trim();
      if (!input) return;

      const match = input.match(/^(take|add)\s+(\d+)?\s*(.+)$/i);
      if (!match) {
        alert('Use: take 2 gauze or add 3 saline');
        return;
      }

      const action = match[1].toLowerCase();
      const amount = match[2] ? Number(match[2]) : 1;
      const name = match[3].trim();
      if (!name) return;

      let item = findInventoryItemByName(name);

      if (!item) {
        item = { id: uid(), title: name, detail: '', qty: 0, reorderPoint: 0, ordered: false, at: new Date().toISOString() };
        state.inventory.unshift(item);
      }

      const delta = action === 'take' ? -amount : amount;
      item.qty = Math.max(0, n(item.qty) + delta);
      item.at = new Date().toISOString();

      log(`${action === 'take' ? 'Took' : 'Added'} ${amount} ${name}`);
      render();
    }

    function addInventoryItem(){
      const command = prompt('Type a command like: take 2 gauze or add 3 saline');
      if (!command) return;
      applyInventoryCommand(command);
    }

    function addNote(){
      const title = prompt('Note title?');
      if (!title) return;
      const detail = prompt('Note text?','') || '';
      state.notes.unshift({ id: uid(), title, detail, at: new Date().toISOString() });
      log(`Added note: ${title}`);
      render();
    }

    function editByType(type, itemId){
      const key = type === 'inventory' ? 'inventory' : type + 's';
      const item = state[key].find(x => x.id === itemId);
      if (!item) return;

      const title = prompt('Title', item.title || '');
      if (title === null) return;
      const detail = prompt('Details', item.detail || '') || '';
      item.title = title;
      item.detail = detail;

      if (type === 'inventory') {
        item.qty = n(prompt('Quantity', item.qty ?? 0));
        item.reorderPoint = n(prompt('Reorder point', item.reorderPoint ?? 0));
      }

      item.at = new Date().toISOString();
      log(`Edited ${type}: ${title}`);
      render();
    }

    function deleteByType(type, itemId){
      const key = type === 'inventory' ? 'inventory' : type + 's';
      const list = state[key];
      const idx = list.findIndex(x => x.id === itemId);
      if (idx < 0) return;

      const name = list[idx].title || type;
      if (!confirm(`Delete ${name}?`)) return;

      list.splice(idx,1);
      log(`Deleted ${type}: ${name}`);
      render();
    }

    function renderLists(){
      const treatments = recentTreatments();
      const historyWindow = itemsInLastDays(state.treatments, 10);
      const inventoryToShow = visibleInventory();

      $('treatmentsList').innerHTML = '';
      if (!treatments.length) $('treatmentsList').innerHTML = '<div class="empty">No treatments found.</div>';
      treatments.forEach(item => $('treatmentsList').appendChild(treatmentEntry(item)));

      $('inventoryList').innerHTML = '';
      if (!inventoryToShow.length) {
        $('inventoryList').innerHTML = state.inventorySearch
          ? '<div class="empty">No inventory items matched your search.</div>'
          : '<div class="empty">No inventory items yet.</div>';
      }
      inventoryToShow.forEach(item => $('inventoryList').appendChild(inventoryEntry(item)));

      $('notesList').innerHTML = '';
      if (!state.notes.length) $('notesList').innerHTML = '<div class="empty">No notes yet.</div>';
      state.notes.forEach(item => $('notesList').appendChild(noteEntry(item)));

      $('historyList').innerHTML = '';
      if (!historyWindow.length) $('historyList').innerHTML = '<div class="empty">No treatments in the last 10 days.</div>';
      historyWindow.forEach(item => $('historyList').appendChild(treatmentEntry(item)));
    }

    function render(){
      renderCounts();
      renderViews();
      renderLists();
      save();
    }

    document.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        setTab(btn.dataset.tab);
      });
    });

    $('addTreatmentBtn').addEventListener('click', addTreatment);
    $('addItemBtn').addEventListener('click', addInventoryItem);
    $('addNoteBtn').addEventListener('click', addNote);

    document.body.addEventListener('click', (e) => {
      const edit = e.target.closest('[data-edit]');
      const del = e.target.closest('[data-del]');
      const adjust = e.target.closest('[data-adjust]');
      const order = e.target.closest('[data-order]');
      const showAllBtn = e.target.closest('[data-show-all-treatments]');
      const searchClear = e.target.closest('[data-clear-inventory-search]');
      const dataAction = e.target.closest('#dataActionBtn');

      if (showAllBtn) {
        state.showAllTreatments = !state.showAllTreatments;
        log(state.showAllTreatments ? 'Show all treatments enabled' : 'Show all treatments disabled');
        render();
        return;
      }

      if (searchClear) {
        state.inventorySearch = '';
        $('inventoryList').previousElementSibling?.value = '';
        render();
        return;
      }

      if (dataAction) {
        const choice = prompt('Type "import" or "export"');
        if (!choice) return;
        const action = choice.trim().toLowerCase();
        if (action === 'export') {
          const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'dialysis-agent-companion.json';
          a.click();
          URL.revokeObjectURL(a.href);
        } else if (action === 'import') {
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = 'application/json';
          input.onchange = async () => {
            const file = input.files[0];
            if (!file) return;
            try {
              const data = JSON.parse(await file.text());
              if (!data || typeof data !== 'object') throw new Error('Invalid file');
              const imported = normalizeImportedData(data);
              state.tab = imported.tab;
              state.treatments = imported.treatments;
              state.inventory = imported.inventory;
              state.notes = imported.notes;
              state.history = Array.isArray(imported.history) ? imported.history.filter(h => h && h.at && h.text) : [];
              state.inventorySearch = '';
              state.showAllTreatments = false;
              log(`Imported backup: ${file.name}`);
              save();
              render();
            } catch {
              alert('That file could not be imported.');
            }
          };
          input.click();
        }
        return;
      }

      if (edit) {
        editByType(edit.dataset.edit, edit.dataset.id);
        return;
      }

      if (del) {
        deleteByType(del.dataset.del, del.dataset.id);
        return;
      }

      if (adjust) {
        const item = state.inventory.find(x => x.id === adjust.dataset.id);
        if (!item) return;
        item.qty = n(item.qty) + n(adjust.dataset.adjust);
        log(`Adjusted ${item.title}: ${adjust.dataset.adjust}`);
        render();
        return;
      }

      if (order) {
        const item = state.inventory.find(x => x.id === order.dataset.id);
        if (!item) return;
        item.ordered = !item.ordered;
        log(`${item.ordered ? 'Marked' : 'Unmarked'} ordered: ${item.title}`);
        render();
        return;
      }
    });

    document.body.addEventListener('input', (e) => {
      const search = e.target.closest('[data-inventory-search]');
      if (!search) return;
      state.inventorySearch = search.value;
      renderLists();
      save();
    });

    function normalizeImportedData(data){
      const out = {
        tab: data.tab || data.activeTab || 'home',
        treatments: [],
        inventory: [],
        notes: [],
        history: Array.isArray(data.history) ? data.history : []
      };

      if (Array.isArray(data.treatments)) out.treatments = data.treatments;
      if (Array.isArray(data.notes)) out.notes = data.notes;

      if (Array.isArray(data.inventory)) {
        out.inventory = data.inventory;
      } else if (Array.isArray(data.items)) {
        out.inventory = data.items.map(item => ({
          id: item.id || uid(),
          title: item.name || 'Item',
          detail: [item.category, item.unit, item.expires ? `Expires: ${item.expires}` : '', item.status ? `Status: ${item.status}` : '', item.notes || ''].filter(Boolean).join(' • '),
          qty: n(item.onHand),
          reorderPoint: n(item.reorderPoint),
          ordered: String(item.status || '').toLowerCase().includes('order'),
          at: new Date().toISOString()
        }));
      }

      return out;
    }

    setTab(state.tab || 'home');
    render();
  </script>
</body>
</html>
